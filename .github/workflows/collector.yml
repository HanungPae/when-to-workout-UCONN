name: collect-gym-data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# ADD THIS BLOCK to allow the bot to push the CSV back to your repo
permissions:
  contents: write 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install packages
        run: |
          pip install playwright
          playwright install chromium

      - name: run script
        run: python occupancy_tracker.py

      - name: commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.csv
          git commit -m "update data" || exit 0
          git push
